<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в Telegram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #0088cc;
      --accent-color: #00c6ff;
      --bg-gradient: linear-gradient(135deg, #1d2671 0%, #c33764 100%);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: #ffffff;
      padding: 20px;
      overflow: hidden;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
    }
    .circle-1 { width: 300px; height: 300px; background: var(--primary-color); top: -50px; left: -50px; }
    .circle-2 { width: 250px; height: 250px; background: #ff0080; bottom: -50px; right: -50px; }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .icon-wrapper {
      width: 70px;
      height: 70px;
      background: #ffffff;
      border-radius: 20px;
      margin: 0 auto 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      fill: var(--primary-color);
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }

    .ai-box {
      margin-bottom: 30px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      font-size: 14px;
      line-height: 1.5;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-main {
      display: block;
      width: 100%;
      padding: 18px;
      background: #ffffff;
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 800;
      border-radius: 16px;
      font-size: 18px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      background: #f0f0f0;
    }

    .btn-main:active {
      transform: translateY(0);
    }

    .loading-dots:after {
      content: ' .';
      animation: dots 1s steps(5, end) infinite;
    }

    @keyframes dots {
      0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
      40% { color: white; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
      60% { text-shadow: .2em 0 0 white, .4em 0 0 rgba(0,0,0,0); }
      80%, 100% { text-shadow: .2em 0 0 white, .4em 0 0 white; }
    }

    .footer-text {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="card">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18.717-.962 4.084-1.362 5.411-.168.567-.348.758-.548.777-.446.041-.784-.294-1.216-.577-.677-.442-1.06-.717-1.716-1.149-.758-.499-.267-.773.165-1.222.114-.117 2.083-1.91 2.121-2.072.005-.02.01-.095-.035-.135-.045-.04-.11-.027-.157-.017-.068.015-1.149.73-3.238 2.14-.306.21-.583.313-.831.307-.273-.006-.8-.153-1.191-.282-.48-.159-.861-.243-.827-.513.017-.141.213-.285.586-.433 2.296-.999 3.827-1.658 4.593-1.977 2.187-.905 2.642-1.062 2.937-1.067.065-.001.21.015.305.092.08.065.102.152.111.212.01.068.021.234.013.344z"/></svg>
    </div>

    <h1>Добро пожаловать!</h1>
    
    <div class="ai-box" id="aiMessage">
      <span class="loading-dots">✨ ИИ готовит приветствие</span>
    </div>

    <a href="https://t.me/+ksFZ5REnvS00ZDIy" class="btn-main">Вступить в группу</a>

    <div class="footer-text">
      Безопасный переход в официальное приложение Telegram
    </div>
  </div>

  <script>
    const apiKey = ""; // API ключ автоматически подставляется средой
    
    async function callGemini(prompt, systemPrompt = "") {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] }
      };

      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error('API Error');
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "Рады вас видеть!";
        } catch (e) {
          await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
        }
      }
      return "Вы приглашены в эксклюзивное сообщество. Присоединяйтесь!";
    }

    async function loadWelcomeMessage() {
      const msg = await callGemini(
        "Напиши одно короткое и цепляющее приветствие для пользователя, который вступает в закрытое Telegram-сообщество. Максимум 15 слов. Без кавычек.",
        "Ты — дружелюбный хост. Твой стиль: энергичный, современный, гостеприимный."
      );
      document.getElementById("aiMessage").innerHTML = msg;
    }

    window.onload = loadWelcomeMessage;
  </script>
</body>
</html>
